<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Geekology: Atelier Reborn</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;600;700;800;900&family=Inter:wght@300;400;500;600&family=Space+Mono&display=swap" rel="stylesheet">
    <script type="importmap">
    {
        "imports": {
            "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
            "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
        }
    }
    </script>
    <style>
        :root {
            --bg-deep: #050510;
            --bg-card: rgba(15, 15, 40, 0.55);
            --accent: #7dd3fc;
            --accent-glow: rgba(125, 211, 252, 0.4);
            --accent2: #c084fc;
            --text-primary: #e2e8f0;
            --text-muted: #94a3b8;
            --border: rgba(125, 211, 252, 0.15);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html {
            scroll-behavior: smooth;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--bg-deep);
            color: var(--text-primary);
            min-height: 100vh;
            overflow-x: hidden;
            cursor: default;
            user-select: none;
            -webkit-user-select: none;
        }

        /* ── Three.js Background Canvas ── */
        #bg-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
        }

        /* ── Main Content ── */
        .container {
            position: relative;
            z-index: 1;
            max-width: 900px;
            margin: 0 auto;
            padding: 0 24px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        /* ── Hero Section ── */
        .hero {
            text-align: center;
            padding-top: max(18vh, 120px);
            padding-bottom: 80px;
        }

        .title {
            font-family: 'Orbitron', sans-serif;
            font-size: clamp(2rem, 5.5vw, 4rem);
            font-weight: 800;
            letter-spacing: 0.04em;
            white-space: nowrap;
            background: linear-gradient(135deg, #e2e8f0 0%, #7dd3fc 45%, #c084fc 75%, #e2e8f0 100%);
            background-size: 200% auto;
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: shimmer 4s ease-in-out infinite;
            margin-bottom: 8px;
        }

        @keyframes shimmer {
            0%, 100% { background-position: 0% center; }
            50% { background-position: 100% center; }
        }

        .title-separator {
            width: 120px;
            height: 2px;
            background: linear-gradient(90deg, transparent, var(--accent), transparent);
            margin: 0 auto 32px;
        }

        /* ── Rotating O's Subtitle ── */
        .subtitle {
            font-family: 'Space Mono', 'Inter', monospace;
            font-size: clamp(0.9rem, 1.6vw, 1.15rem);
            color: var(--text-muted);
            letter-spacing: 0.02em;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-wrap: wrap;
            gap: 0;
            line-height: 1;
        }

        .subtitle-prefix,
        .subtitle-suffix {
            white-space: nowrap;
        }

        .orbit-container {
            position: relative;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 2.8em;
            height: 2.8em;
            margin: 0 0.25em;
        }

        .orbit-o {
            position: absolute;
            color: var(--accent);
            font-weight: 700;
            font-size: 1em;
            text-shadow: 0 0 12px var(--accent-glow), 0 0 24px var(--accent-glow);
            animation: orbitSpin 2.5s linear infinite;
            transform-origin: center center;
        }

        .orbit-o:nth-child(1) { animation-delay: 0s; }
        .orbit-o:nth-child(2) { animation-delay: -0.5s; }
        .orbit-o:nth-child(3) { animation-delay: -1.0s; }
        .orbit-o:nth-child(4) { animation-delay: -1.5s; }
        .orbit-o:nth-child(5) { animation-delay: -2.0s; }

        @keyframes orbitSpin {
            0% {
                transform: rotate(0deg) translateX(13px) rotate(0deg);
            }
            100% {
                transform: rotate(360deg) translateX(13px) rotate(-360deg);
            }
        }

        .subtitle-by {
            display: block;
            width: 100%;
            margin-top: 10px;
            font-family: 'Space Mono', monospace;
            font-size: 0.82em;
            color: var(--accent2);
            opacity: 0.65;
            letter-spacing: 0.08em;
        }

        /* ── Repos Section ── */
        .repos-section {
            width: 100%;
            max-width: 680px;
            padding-bottom: 60px;
        }

        .section-label {
            font-family: 'Space Mono', monospace;
            font-size: 0.75rem;
            letter-spacing: 0.18em;
            color: var(--accent);
            text-transform: uppercase;
            margin-bottom: 28px;
            text-align: center;
        }

        .repo-card {
            display: flex;
            align-items: flex-start;
            gap: 20px;
            padding: 24px 28px;
            margin-bottom: 16px;
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 16px;
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            text-decoration: none;
            color: inherit;
            position: relative;
            overflow: hidden;
        }

        .repo-card::before {
            content: '';
            position: absolute;
            inset: 0;
            background: radial-gradient(ellipse at 50% 0%, var(--accent-glow), transparent 70%);
            opacity: 0;
            transition: opacity 0.4s ease;
        }

        .repo-card:hover {
            border-color: rgba(125, 211, 252, 0.4);
            transform: translateY(-2px);
            box-shadow: 0 8px 32px rgba(125, 211, 252, 0.08), 0 2px 8px rgba(125, 211, 252, 0.04);
        }

        .repo-card:hover::before {
            opacity: 0.06;
        }

        .repo-icon {
            flex-shrink: 0;
            width: 40px;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 12px;
            background: rgba(125, 211, 252, 0.08);
            color: var(--accent);
            margin-top: 2px;
        }

        .repo-icon svg {
            width: 20px;
            height: 20px;
        }

        .repo-info {
            flex: 1;
            min-width: 0;
        }

        .repo-name {
            font-weight: 600;
            font-size: 1.05rem;
            color: var(--text-primary);
            margin-bottom: 4px;
            display: flex;
            align-items: center;
            gap: 10px;
            flex-wrap: wrap;
        }

        .fork-badge {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            font-size: 0.7rem;
            font-weight: 500;
            padding: 2px 10px;
            border-radius: 99px;
            background: rgba(192, 132, 252, 0.12);
            color: var(--accent2);
            letter-spacing: 0.04em;
        }

        .repo-desc {
            font-size: 0.88rem;
            color: var(--text-muted);
            line-height: 1.5;
        }

        .repo-arrow {
            flex-shrink: 0;
            color: var(--text-muted);
            transition: all 0.3s ease;
            margin-top: 8px;
        }

        .repo-card:hover .repo-arrow {
            color: var(--accent);
            transform: translateX(4px);
        }

        /* ── Loading State ── */
        .loading-skeleton {
            animation: pulse 1.8s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 0.4; }
            50% { opacity: 0.8; }
        }

        .skeleton-line {
            height: 12px;
            background: rgba(125, 211, 252, 0.1);
            border-radius: 6px;
            margin-bottom: 8px;
        }

        .skeleton-line:last-child {
            width: 60%;
        }

        /* ── Footer ── */
        .footer {
            text-align: center;
            padding: 40px 24px 48px;
            font-family: 'Space Mono', monospace;
            font-size: 0.8rem;
            color: var(--text-muted);
            letter-spacing: 0.12em;
            position: relative;
            z-index: 1;
        }

        .footer-line {
            width: 60px;
            height: 1px;
            background: rgba(125, 211, 252, 0.2);
            margin: 0 auto 20px;
        }

        .footer-text {
            opacity: 0.7;
            transition: opacity 0.5s ease;
        }

        .footer-text:hover {
            opacity: 1;
            color: var(--accent);
        }

        /* ── Error / Empty state ── */
        .error-state {
            text-align: center;
            padding: 40px 20px;
            color: var(--text-muted);
            font-size: 0.9rem;
        }

        /* ── Reduced Motion ── */
        @media (prefers-reduced-motion: reduce) {
            .orbit-o {
                animation: none;
            }
            .title {
                animation: none;
            }
        }

        /* ── Responsive ── */
        @media (max-width: 640px) {
            .hero {
                padding-top: max(12vh, 80px);
                padding-bottom: 50px;
            }
            .repo-card {
                padding: 18px 20px;
                gap: 14px;
                border-radius: 12px;
            }
            .repo-icon {
                width: 34px;
                height: 34px;
                border-radius: 10px;
            }
            .repo-icon svg {
                width: 17px;
                height: 17px;
            }
            .repo-desc {
                font-size: 0.82rem;
            }
            .title {
                white-space: normal;
            }
        }

        /* ── Drag hint ── */
        .drag-hint {
            position: fixed;
            bottom: 28px;
            left: 50%;
            transform: translateX(-50%);
            font-family: 'Space Mono', monospace;
            font-size: 0.65rem;
            color: var(--text-muted);
            opacity: 0.4;
            letter-spacing: 0.08em;
            pointer-events: none;
            transition: opacity 0.8s ease;
            z-index: 1;
        }

        .drag-hint.fading {
            opacity: 0;
        }

        /* ── Cosmic Quotes ── */
        .quotes-section {
            text-align: center;
            padding: 50px 24px 10px;
            position: relative;
            z-index: 1;
            max-width: 600px;
            margin: 0 auto;
        }

        .quotes-text {
            font-family: 'Space Mono', monospace;
            font-size: 0.78rem;
            color: var(--text-muted);
            opacity: 0;
            transform: translateY(8px);
            transition: opacity 1s ease, transform 1s ease;
            letter-spacing: 0.03em;
            line-height: 1.8;
            min-height: 3em;
        }

        .quotes-text.active {
            opacity: 0.7;
            transform: translateY(0);
        }
    </style>
</head>
<body>
    <!-- Three.js Background (stars + planets) -->
    <canvas id="bg-canvas"></canvas>
    <div class="drag-hint" id="drag-hint">Drag to explore the Solar System</div>

    <!-- Main Content -->
    <div class="container">
        <!-- Hero -->
        <section class="hero">
            <h1 class="title">Geekology: Atelier Reborn</h1>
            <div class="title-separator"></div>
            <p class="subtitle" aria-label="We just define some COOOOOL things. The five O's rotate around a center.">
                <span class="subtitle-prefix">We just define some C</span>
                <span class="orbit-container" aria-hidden="true">
                    <span class="orbit-o">O</span>
                    <span class="orbit-o">O</span>
                    <span class="orbit-o">O</span>
                    <span class="orbit-o">O</span>
                    <span class="orbit-o">O</span>
                </span>
                <span class="subtitle-suffix">L things.</span>
                <span class="subtitle-by">——By KaedeCo.</span>
            </p>
        </section>

        <!-- Repos Section -->
        <section class="repos-section">
            <p class="section-label">Projects</p>
            <div id="repos-container">
                <!-- Skeleton loading -->
                <div class="repo-card loading-skeleton" style="pointer-events:none;">
                    <div style="width:40px;height:40px;border-radius:12px;background:rgba(125,211,252,0.06);flex-shrink:0;"></div>
                    <div style="flex:1;">
                        <div class="skeleton-line" style="width:40%;"></div>
                        <div class="skeleton-line"></div>
                        <div class="skeleton-line"></div>
                    </div>
                </div>
                <div class="repo-card loading-skeleton" style="pointer-events:none;">
                    <div style="width:40px;height:40px;border-radius:12px;background:rgba(125,211,252,0.06);flex-shrink:0;"></div>
                    <div style="flex:1;">
                        <div class="skeleton-line" style="width:35%;"></div>
                        <div class="skeleton-line"></div>
                        <div class="skeleton-line"></div>
                    </div>
                </div>
                <div class="repo-card loading-skeleton" style="pointer-events:none;">
                    <div style="width:40px;height:40px;border-radius:12px;background:rgba(125,211,252,0.06);flex-shrink:0;"></div>
                    <div style="flex:1;">
                        <div class="skeleton-line" style="width:45%;"></div>
                        <div class="skeleton-line"></div>
                        <div class="skeleton-line"></div>
                    </div>
                </div>
            </div>
        </section>
    </div>

    <!-- Cosmic Quotes -->
    <div class="quotes-section">
        <p class="quotes-text active" id="quotes-text"></p>
    </div>

    <!-- Footer -->
    <footer class="footer">
        <div class="footer-line"></div>
        <p class="footer-text">Ad astra, Per aspera.</p>
    </footer>


    <script>
        /* ═══════════════════════════════════════════
           GITHUB REPOS FETCH — auto-sync all public repos
           ═══════════════════════════════════════════ */
        (function() {
            const container = document.getElementById('repos-container');
            const PAGES_REPO = 'KaedeCo.github.io';

            function renderRepos(repos) {
                if (repos.length === 0) {
                    container.innerHTML = '<div class="error-state">No public projects yet.</div>';
                    return;
                }

                const html = repos.map(repo => {
                    const isFork = repo.fork;
                    const desc = repo.description || '';
                    return `
                    <a href="${repo.html_url}" class="repo-card" target="_blank" rel="noopener noreferrer" aria-label="Open ${repo.name} on GitHub">
                        <div class="repo-icon">
                            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                ${isFork
                                    ? '<circle cx="12" cy="18" r="3"/><circle cx="6" cy="6" r="3"/><circle cx="18" cy="6" r="3"/><path d="M18 9v1a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2V9"/><path d="M12 12v3"/>'
                                    : '<path d="M15 22v-4a4.8 4.8 0 0 0-1-3.5c3 0 6-2 6-5.5.08-1.25-.27-2.48-1-3.5.28-1.15.28-2.35 0-3.5 0 0-1 0-3 1.5-2.64-.5-5.36-.5-8 0C6 2 5 2 5 2c-.3 1.15-.3 2.35 0 3.5A5.403 5.403 0 0 0 4 9c0 3.5 3 5.5 6 5.5-.39.49-.68 1.05-.85 1.65-.17.6-.22 1.23-.15 1.85v4"/><path d="M9 18c-4.51 2-5-2-7-2"/>'
                                }
                            </svg>
                        </div>
                        <div class="repo-info">
                            <div class="repo-name">
                                ${repo.name}
                                ${isFork ? '<span class="fork-badge">Fork</span>' : ''}
                            </div>
                            <p class="repo-desc">${desc}</p>
                        </div>
                        <div class="repo-arrow">
                            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <path d="M7 17L17 7"/><path d="M7 7h10v10"/>
                            </svg>
                        </div>
                    </a>`;
                }).join('');

                container.innerHTML = html;
            }

            // Fetch from GitHub API — auto-sync all public repos
            fetch('https://api.github.com/users/KaedeCo/repos?per_page=30&sort=updated')
                .then(res => {
                    if (!res.ok) throw new Error('API error');
                    return res.json();
                })
                .then(allRepos => {
                    const filtered = allRepos
                        .filter(r => r.name !== PAGES_REPO)
                        .filter(r => !r.archived);

                    if (filtered.length === 0) {
                        container.innerHTML = '<div class="error-state">No public projects yet.</div>';
                    } else {
                        renderRepos(filtered);
                    }
                })
                .catch(() => {
                    container.innerHTML = '<div class="error-state">Unable to load projects. Check back soon.</div>';
                });
        })();
    </script>

    <!-- ═══════════════════════════════════════════
         3D SOLAR SYSTEM BACKGROUND
         ═══════════════════════════════════════════ -->
    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

        const J2000 = new Date('2000-01-01T12:00:00Z').getTime();
        function daysSinceJ2000() { return (Date.now() - J2000) / 86400000; }

        /* ── Planet data ── displayDist = sqrt(a) * scaleFactor for compressed viewport fit */
        const SF = 5.8;
        const PLANETS = [
            { name:'Mercury', a:0.387,  period:87.97,  m0:174.79, inc:7.00, color:0xb0ada6, size:0.10, ring:false },
            { name:'Venus',   a:0.723,  period:224.70, m0:50.42,  inc:3.39, color:0xe6d5a8, size:0.26, ring:false },
            { name:'Earth',   a:1.000,  period:365.25, m0:357.52, inc:0.00, color:0x4499dd, size:0.28, ring:false },
            { name:'Mars',    a:1.524,  period:686.98, m0:19.39,  inc:1.85, color:0xcc6644, size:0.18, ring:false },
            { name:'Jupiter', a:5.203,  period:4332.6, m0:18.82,  inc:1.30, color:0xd4a574, size:1.05, ring:false },
            { name:'Saturn',  a:9.537,  period:10759,  m0:320.35, inc:2.49, color:0xe8d5a0, size:0.85, ring:true  },
            { name:'Uranus',  a:19.19,  period:30685,  m0:142.96, inc:0.77, color:0x88ccdd, size:0.50, ring:false },
            { name:'Neptune', a:30.07,  period:60189,  m0:260.25, inc:1.77, color:0x4466ee, size:0.48, ring:false },
            { name:'Pluto',   a:39.48,  period:90465,  m0:14.86,  inc:17.1, color:0xccbbaa, size:0.07, ring:false },
        ];

        function getPlanetPos(p, days) {
            const ma = THREE.MathUtils.degToRad(p.m0 + (360 / p.period) * days);
            const dist = Math.sqrt(p.a) * SF;
            const inc = THREE.MathUtils.degToRad(p.inc);
            return new THREE.Vector3(dist * Math.cos(ma), dist * Math.sin(ma) * Math.sin(inc), dist * Math.sin(ma) * Math.cos(inc));
        }

        /* ── Scene ── */
        const canvas = document.getElementById('bg-canvas');
        const scene = new THREE.Scene();

        const camera = new THREE.PerspectiveCamera(50, window.innerWidth / window.innerHeight, 0.3, 200);
        camera.position.set(0, 28, 42);
        camera.lookAt(0, 0, 0);

        const renderer = new THREE.WebGLRenderer({ canvas, antialias: true, alpha: true });
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.toneMapping = THREE.ACESFilmicToneMapping;
        renderer.toneMappingExposure = 1.3;

        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.06;
        controls.minDistance = 8;
        controls.maxDistance = 65;
        controls.target.set(0, 1, 0);
        controls.autoRotate = true;
        controls.autoRotateSpeed = 0.25;
        controls.update();

        /* ── Background stars (with twinkle via custom shader) ── */
        const starGeo = new THREE.BufferGeometry();
        const starCount = 4000;
        const starVerts = new Float32Array(starCount * 3);
        const starColors = new Float32Array(starCount * 3);
        const starPhases = new Float32Array(starCount); // random phase offsets
        for (let i = 0; i < starCount * 3; i += 3) {
            const idx = i / 3;
            const r = 40 + Math.random() * 90;
            const theta = Math.random() * Math.PI * 2;
            const phi = Math.acos(2 * Math.random() - 1);
            starVerts[i]     = r * Math.sin(phi) * Math.cos(theta);
            starVerts[i + 1] = r * Math.sin(phi) * Math.sin(theta);
            starVerts[i + 2] = r * Math.cos(phi);
            const tint = Math.random();
            if (tint < 0.08) { starColors[i]=0.68; starColors[i+1]=0.83; starColors[i+2]=1.0; }
            else if (tint < 0.16) { starColors[i]=0.75; starColors[i+1]=0.52; starColors[i+2]=1.0; }
            else { const b = 0.7 + Math.random() * 0.3; starColors[i]=b; starColors[i+1]=b; starColors[i+2]=b; }
            starPhases[idx] = Math.random() * Math.PI * 2;
        }
        starGeo.setAttribute('position', new THREE.BufferAttribute(starVerts, 3));
        starGeo.setAttribute('color', new THREE.BufferAttribute(starColors, 3));
        starGeo.setAttribute('phase', new THREE.BufferAttribute(starPhases, 1));

        const starMat = new THREE.ShaderMaterial({
            uniforms: {
                uTime: { value: 0 }
            },
            vertexShader: /*glsl*/`
                in float phase;
                in vec3 color;
                out vec3 vColor;
                out float vPhase;
                void main() {
                    vec4 mvPosition = modelViewMatrix * vec4(position, 1.0);
                    gl_PointSize = (420.0 / -mvPosition.z);
                    gl_Position = projectionMatrix * mvPosition;
                    vColor = color;
                    vPhase = phase;
                }
            `,
            fragmentShader: /*glsl*/`
                in vec3 vColor;
                in float vPhase;
                uniform float uTime;
                void main() {
                    float d = length(gl_PointCoord - vec2(0.5));
                    if (d > 0.5) discard;
                    float twinkle = 0.12 + 0.88 * (0.5 + 0.5 * sin(uTime * 3.0 + vPhase * 61.0));
                    float glow = exp(-d * 8.0) * twinkle;
                    float core = smoothstep(0.5, 0.0, d) * twinkle * 0.55;
                    gl_FragColor = vec4(vColor, glow + core);
                }
            `,
            transparent: true,
            blending: THREE.AdditiveBlending,
            depthWrite: false
        });
        const starsMesh = new THREE.Points(starGeo, starMat);
        scene.add(starsMesh);

        /* ── Lighting ── */
        scene.add(new THREE.AmbientLight(0x14142e, 0.6));
        const sunLight = new THREE.PointLight(0xfff8e7, 180, 200, 0.3);
        scene.add(sunLight);

        /* ── Sun (larger) ── */
        const sunGeo = new THREE.SphereGeometry(2.2, 64, 64);
        const sunMat = new THREE.MeshBasicMaterial({ color:0xffee88 });
        const sun = new THREE.Mesh(sunGeo, sunMat);
        scene.add(sun);

        // Inner glow
        const glow1Geo = new THREE.SphereGeometry(2.5, 32, 32);
        const glow1Mat = new THREE.MeshBasicMaterial({ color:0xffcc44, transparent:true, opacity:0.18, blending:THREE.AdditiveBlending, depthWrite:false });
        const glow1 = new THREE.Mesh(glow1Geo, glow1Mat);
        scene.add(glow1);

        // Outer glow
        const glow2Geo = new THREE.SphereGeometry(3.2, 32, 32);
        const glow2Mat = new THREE.MeshBasicMaterial({ color:0xff8800, transparent:true, opacity:0.06, blending:THREE.AdditiveBlending, depthWrite:false });
        const glow2 = new THREE.Mesh(glow2Geo, glow2Mat);
        scene.add(glow2);

        /* ── Orbit rings ── */
        function createOrbitRing(radius, inclination) {
            const pts = [];
            const seg = 256;
            const inc = THREE.MathUtils.degToRad(inclination);
            for (let i = 0; i <= seg; i++) {
                const a = (i / seg) * Math.PI * 2;
                pts.push(new THREE.Vector3(Math.cos(a) * radius, Math.sin(a) * radius * Math.sin(inc), Math.sin(a) * radius * Math.cos(inc)));
            }
            return new THREE.Line(new THREE.BufferGeometry().setFromPoints(pts),
                new THREE.LineBasicMaterial({ color:0x334466, transparent:true, opacity:0.22, depthWrite:false }));
        }
        PLANETS.forEach(p => scene.add(createOrbitRing(Math.sqrt(p.a) * SF, p.inc)));

        /* ── Create planets ── */
        const planetMeshes = [];
        PLANETS.forEach(p => {
            const geo = new THREE.SphereGeometry(p.size, 48, 48);
            const mat = new THREE.MeshStandardMaterial({ color:p.color, roughness:0.65, metalness:0.15 });
            const mesh = new THREE.Mesh(geo, mat);
            mesh.userData = { planet:p };
            scene.add(mesh);
            planetMeshes.push(mesh);
            if (p.ring) {
                const ringGeo = new THREE.TorusGeometry(p.size * 1.5, p.size * 0.28, 16, 80);
                const ringMat = new THREE.MeshStandardMaterial({ color:0xe8d5a0, roughness:0.6, metalness:0.2, side:THREE.DoubleSide, transparent:true, opacity:0.7 });
                const ring = new THREE.Mesh(ringGeo, ringMat);
                ring.rotation.x = Math.PI / 2.3;
                mesh.add(ring);
            }
        });

        /* ── Drag hint fade ── */
        const dragHint = document.getElementById('drag-hint');
        let hintTimer = null;
        controls.addEventListener('start', () => {
            dragHint.classList.add('fading');
            if (hintTimer) clearTimeout(hintTimer);
        });
        controls.addEventListener('end', () => {
            hintTimer = setTimeout(() => dragHint.classList.remove('fading'), 3000);
        });

        /* ── Animation ── */
        function animate() {
            requestAnimationFrame(animate);
            const days = daysSinceJ2000();
            const time = performance.now() * 0.001;
            starMat.uniforms.uTime.value = time;
            const pulse = 1 + Math.sin(time * 0.4) * 0.04;
            glow1.scale.setScalar(pulse);
            glow2.scale.setScalar(pulse * 0.95);
            planetMeshes.forEach(m => {
                m.position.copy(getPlanetPos(m.userData.planet, days));
                m.rotation.y += 0.01;
            });
            controls.update();
            renderer.render(scene, camera);
        }

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        animate();
    </script>

    <!-- ═══════════════════════════════════════════
         COSMIC QUOTES — rotate every 10 seconds
         ═══════════════════════════════════════════ -->
    <script>
        (function() {
            const quotes = [
                'Earth spins at 465 m/s at the equator. Standing perfectly still, you are actually racing through space at 1,674 km/h.',
                'The light touching your eyes right now left the Sun 8 minutes and 20 seconds ago. You are always looking into the past.',
                'There are more stars in the universe than grains of sand on every beach on Earth. Somewhere, someone might be looking back.',
                'You are made of stardust. The iron in your blood — the calcium in your bones — all forged in the heart of a dying star.',
                'The Solar System travels at 220 km/s around the Milky Way. In the last second alone, you moved 220 kilometers through the galaxy.',
                'A day on Venus is longer than its year. Time flows by entirely different rules just next door.',
                'Neutrinos from the Sun pass through your body — 100 trillion of them every second. You are a ghost to them, and they to you.',
                'Voyager 1 is 24 billion kilometers away, still whispering back to us — humanity\'s farthest hello.',
                'Every atom in your body was once inside a star. You are the universe experiencing itself.',
                'The Moon drifts 3.8 centimeters farther from Earth each year. One day, there will be no more total solar eclipses. You exist in a rare window of cosmic time.'
            ];

            const el = document.getElementById('quotes-text');
            let current = 0;

            function showQuote(index) {
                el.classList.remove('active');
                setTimeout(() => {
                    el.textContent = quotes[index];
                    el.classList.add('active');
                }, 600);
            }

            showQuote(0);

            setInterval(() => {
                current = (current + 1) % quotes.length;
                showQuote(current);
            }, 10000);
        })();
    </script>
